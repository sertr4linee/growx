<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GrowX Reply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
      --accent: #1d9bf0; --text: #e7e9ea; --text-muted: #71767b;
      --success: #00ba7c; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; width: 240px; }
    .popup { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .header { display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 15px; font-weight: 800; }
    .logo span { color: var(--accent); }
    .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .dot.ok { background: var(--success); }
    .dot.warn { background: #ffd400; }
    .status-text { color: var(--text-muted); }
    .hint { font-size: 12px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius); padding: 10px 12px; line-height: 1.5; border: 1px solid var(--border); }
    .btn { background: var(--accent); border: none; border-radius: var(--radius); color: #fff; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px 14px; width: 100%; transition: background 0.15s; }
    .btn:hover { background: #1a8cd8; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); background: var(--surface); }
  </style>
</head>
<body>
  <div class="popup">
    <div class="header">
      <span style="font-size:18px">⚡</span>
      <div class="logo">GrowX <span>Reply</span></div>
    </div>

    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking...</span>
    </div>

    <div class="hint" id="hint-text">Like any tweet on X to auto-generate a reply in the side panel.</div>

    <button class="btn" id="btn-open-panel">Open Side Panel</button>
    <button class="btn btn-ghost" id="btn-settings">⚙️ Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
