<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowX Reply</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">GrowX Reply</span>
      </div>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
    </header>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">❤️</div>
      <p>Like a tweet on X to generate a reply</p>
      <span class="hint">The reply will appear here automatically</span>
    </div>

    <!-- Main content (hidden until tweet is liked) -->
    <div id="main-content" class="hidden">

      <!-- Tweet Preview -->
      <section class="card" id="tweet-preview">
        <div class="card-label">Tweet</div>
        <div class="tweet-author">@<span id="tweet-author-handle"></span></div>
        <div class="tweet-text" id="tweet-text-content"></div>
        <a id="tweet-link" href="#" target="_blank" class="tweet-link">View tweet →</a>
      </section>

      <!-- Tone Selector -->
      <section class="card">
        <div class="card-label">Tone</div>
        <div class="tone-grid" id="tone-grid">
          <button class="tone-btn active" data-tone="casual">Casual</button>
          <button class="tone-btn" data-tone="pro">Pro</button>
          <button class="tone-btn" data-tone="humorous">Humorous</button>
          <button class="tone-btn" data-tone="engaging">Engaging</button>
        </div>
      </section>

      <!-- Generated Reply -->
      <section class="card">
        <div class="card-label">Reply</div>
        <div id="loading-indicator" class="loading hidden">
          <div class="spinner"></div>
          <span>Generating...</span>
        </div>
        <div id="error-message" class="error hidden"></div>
        <textarea
          id="reply-textarea"
          placeholder="Your AI-generated reply will appear here..."
          rows="5"
          maxlength="280"
        ></textarea>
        <div class="char-count"><span id="char-count">0</span>/280</div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-regenerate" class="btn btn-secondary">
          🔄 Regenerate
        </button>
        <button id="btn-copy" class="btn btn-primary">
          📋 Copy Reply
        </button>
      </div>

      <!-- Toast -->
      <div id="toast" class="toast hidden">✅ Copied to clipboard!</div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
